# ctcf_ref_single_classification_binsplit2_enc001.yaml
# entexBERT-2 on INDIVIDUAL 1 (ENC-001) CTCF, for the direct head-to-head with the
# DNABERT-1 leak-free retrain (also enc001 CTCF, single reference window, downsample-balanced).
# IDENTICAL to the ENC-002 ref_single binsplit2 config EXCEPT donor -> ENC-001.
experiment: ctcf_ref_single_classification_binsplit2_enc001

ref_fasta: /home/asm242/reference_genome/hg38.fa
row_source:
  type: snv_tsv
  path: /home/asm242/entex_data/hetSNVs.tsv
  min_total_reads: 20

primary_label:
  type: as_class
  name: imbalance_significance

sequence:
  input_mode: ref_single

window:
  left_bp: 128
  right_bp: 128
  snv_offset_mode: fixed
  jitter_max_bp: 0

head:
  task: classification
  num_labels: 2
  head_num_layers: 1

split:
  group: locus
  mode: train_dev_test
  ratio: [0.8, 0.1, 0.1]

partition:
  enabled: true
  bin_size: 100000
  salt: entexbert2_v1
  fold_assignment: {}
  bin_test_frac: 0.10
  bin_dev_frac: 0.10
  exclude_boundary: true

balance:
  strategy: global_binary
  apply_to: train
  label_col: imbalance_significance

datasets:
  - {donor: ENC-001, assay: TF-ChIP-seq_CTCF}
