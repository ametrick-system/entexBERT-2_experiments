# ctcf_ref_alt_pair_regression.yaml
# Signed-effect ASB regression on PAIRED ref/alt windows (Wave B).
# Target: signed_log_alt_ref = log(alt_count+1) - log(ref_count+1)  (>0 => ALT binds more).
# The build writes sequence1 (REF window) + sequence2 (ALT window); the finetune auto-detects
# the pair, tokenizes each separately, and the forward pass forms the SIGNED contrast
# head(alt) - head(ref). This is the framing ref_single structurally could not represent.

experiment: ctcf_ref_alt_pair_regression

# --- data source (same EN-TEx hetSNV table as the ref_single work) ---
# NOTE: source selectors live under row_source:; generate_all_inputs injects donor/assay
# per dataset. run_from_config reads cfg["row_source"]["type"|"path"|"min_total_reads"].
ref_fasta: /home/asm242/reference_genome/hg38.fa
row_source:
  type: snv_tsv
  path: /home/asm242/entex_data/hetSNVs.tsv
  min_total_reads: 20          # regression needs reliable counts; drop low-depth loci

# --- primary label: continuous signed effect (NOT the binary significance call) ---
primary_label:
  type: as_regression
  target: signed_log_alt_ref

# --- paired input: this is the whole point ---
sequence:
  input_mode: ref_alt_pair     # -> build writes sequence1(ref)+sequence2(alt); arms twin batch

# --- window (per allele); 256/256 keeps each window well under 512 tokens ---
window:
  left_bp: 256
  right_bp: 256
  snv_offset_mode: fixed
  jitter_max_bp: 0             # start deterministic; add jitter as an ablation later

# --- regression head (linear->small MLP); num_labels MUST be 1 for regression ---
head:
  task: regression
  num_labels: 1
  head_num_layers: 2
  head_hidden_size: -1         # -1 = tie to backbone hidden size

# --- split: leave-chromosome-out, identical fold across donors (no leakage) ---
split:
  group: locus
  mode: train_dev_test
  ratio: [0.8, 0.1, 0.1]

partition:
  enabled: true
  bin_size: 100000
  salt: entexbert2_v1
  fold_id: 0
  fold_assignment: {chr5: 0, chr12: 0, chr21: 0}

# --- no balancing for regression (continuous target, no class imbalance) ---
balance:
  strategy: none

# --- which datasets to build (start with the strongest single one) ---
datasets:
  - {donor: ENC-002, assay: TF-ChIP-seq_CTCF}
