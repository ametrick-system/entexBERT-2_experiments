# ctcf_ref_single_classification_binsplit2.yaml
# CONTROLLED COMPARISON to ctcf_ref_alt_pair_classification_binsplit2.yaml.
# IDENTICAL to the ref_alt_pair binsplit2 config in EVERY respect (same 100kb pure-bin split,
# same train-only balance, same donor/assay, same 256bp flanks, same head depth) EXCEPT the
# input representation: a SINGLE reference window around the SNV instead of the ref/alt twin.
# This isolates the effect of the ref/alt contrast from the split scheme and everything else.
experiment: ctcf_ref_single_classification_binsplit2

ref_fasta: /home/asm242/reference_genome/hg38.fa
row_source:
  type: snv_tsv
  path: /home/asm242/entex_data/hetSNVs.tsv
  min_total_reads: 20        # MATCH the pair config (pair used 20, not the old ref_single's 10)

primary_label:
  type: as_class
  name: imbalance_significance

sequence:
  input_mode: ref_single     # <-- the ONLY substantive change vs the pair config

window:
  left_bp: 256               # MATCH the pair (256/256, fixed, no jitter) so context width is not a confound
  right_bp: 256
  snv_offset_mode: fixed
  jitter_max_bp: 0

head:
  task: classification
  num_labels: 2
  head_num_layers: 2         # MATCH the pair run (head_num_layers 2)
  head_hidden_size: -1

split:
  group: locus
  mode: train_dev_test
  ratio: [0.8, 0.1, 0.1]

partition:
  enabled: true
  bin_size: 100000
  salt: entexbert2_v1         # SAME salt -> SAME bin->split assignment as the pair run
  fold_assignment: {}         # EMPTY -> pure-bin path (all chromosomes train)
  bin_test_frac: 0.10
  bin_dev_frac: 0.10
  exclude_boundary: true

balance:
  strategy: global_binary
  apply_to: train             # train-only balance; dev/test keep NATURAL ~3% prevalence
  label_col: imbalance_significance

datasets:
  - {donor: ENC-002, assay: TF-ChIP-seq_CTCF}
